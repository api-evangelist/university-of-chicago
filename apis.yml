  - type: x-json-ld
    url: json-ld/university-of-chicago-context.jsonld
  - url: graphql/university-of-chicago-graphql.md
    type: GraphQL
- aid: university-of-chicago:cnetid-oidc
  name: CNetID OpenID Connect / Shibboleth Identity
  description: >-
    University of Chicago identity and authentication integrations published
    on the official uchicago GitHub organization, including Shibboleth
    Identity Provider extensions and OpenID Connect (OIDC) examples for
    authenticating CNetID-backed applications.
  humanURL: https://github.com/uchicago
  tags: [Identity, Authentication, OpenID Connect, Shibboleth, SSO]
  properties:
  - type: Documentation
    url: https://github.com/uchicago
  - type: GitHub
    url: https://github.com/uchicago
- aid: university-of-chicago:library-iiif
  name: University of Chicago Library IIIF
  description: >-
    The University of Chicago Library exposes International Image
    Interoperability Framework (IIIF) image and presentation endpoints for its
    digital collections, with related code published in the uchicago-library
    GitHub organization.
  humanURL: https://github.com/uchicago-library/iiif
  baseURL: https://iiif-manifest.lib.uchicago.edu/
  tags: [IIIF, Library, Digital Collections, Images, Open Source]
  properties:
  - type: Documentation
    url: https://github.com/uchicago-library/iiif
  - type: GitHub
    url: https://github.com/uchicago-library
