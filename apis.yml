aid: university-of-chicago
name: University of Chicago
description: >-
  The University of Chicago is a private research university in Chicago,
  Illinois, founded in 1890 and ranked #14 in the QS World University Rankings
  2025. Its public developer and API footprint is anchored in research data
  infrastructure rather than a single central developer portal: the Center for
  Translational Data Science (CTDS) maintains the open-source Gen3 data platform
  (uc-cdis on GitHub), which auto-generates FAIR APIs for accessing biomedical
  data commons. The University also publishes Shibboleth/OpenID Connect identity
  integrations for CNetID authentication, and the University of Chicago Library
  operates IIIF image and presentation endpoints plus a VuFind-based catalog. A
  faculty/staff-facing AI API portal (Azure OpenAI via API Management) exists but
  is gated and not publicly accessible.
