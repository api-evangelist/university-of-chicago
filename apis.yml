apis:
- aid: university-of-chicago:gen3
  name: Gen3 Data Commons APIs (CTDS)
  description: >-
    Open-source data platform maintained by the University of Chicago Center
    for Translational Data Science. Gen3 auto-generates FAIR APIs (data
    submission, GraphQL/Peregrine query, indexing/Indexd, Fence auth) for
    building and accessing biomedical data commons. Code is fully public under
    Apache 2.0 across the uc-cdis GitHub organization.
  humanURL: https://uc-cdis.github.io/gen3-user-doc/
  tags: [Research Data, Data Commons, FAIR, GraphQL, Open Source, Healthcare]
  properties:
  - type: Documentation
    url: https://uc-cdis.github.io/gen3-user-doc/appendices/api-gen3/
  - type: GitHub
    url: https://github.com/uc-cdis
  - type: OpenAPI
    url: openapi/university-of-chicago-fence.yaml
  - type: OpenAPI
    url: openapi/university-of-chicago-indexd.yaml
  - type: OpenAPI
    url: openapi/university-of-chicago-sheepdog.yaml
  - type: OpenAPI
    url: openapi/university-of-chicago-peregrine.yaml
  - type: Vocabulary
